<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Tablas con HTML</title>
</head>
<body>

    <!-- Tabla de ejemplo -->
    <table border="1">

        <!-- Fila de encabezado -->
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Ciudad</th>
        </tr>
        <!-- Fila 1 -->
        <tr>
            <td>Juan</td>
            <td>25</td>
            <td>Madrid</td>
        </tr>
        <!-- Fila 2 -->
        <tr>
            <td>Ana</td>
            <td>30</td>
            <td>Barcelona</td>
        </tr>
        <!-- Fila 3 -->
        <tr>
            <td>Carlos</td>
            <td>28</td>
            <td>Valencia</td>
        </tr>




</body>
</html>
